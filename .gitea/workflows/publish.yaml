name: Publish Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch release branches
        run: |
          git fetch origin \
            "+refs/heads/main:refs/remotes/origin/main" \
            "+refs/heads/release/*:refs/remotes/origin/release/*"

      - name: Validate tag and release channel
        id: meta
        env:
          TAG: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          VERSION="${TAG#v}"
          CURRENT=$(tr -d '\n' < version.txt)

          if [ "$CURRENT" != "$VERSION" ]; then
            echo "version.txt (${CURRENT}) does not match pushed tag (${VERSION})" >&2
            exit 1
          fi

          if printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$'; then
            if ! git branch -r --contains "$SHA" | grep -Eq 'origin/main$'; then
              echo "rc tags must point to a commit reachable from origin/main" >&2
              exit 1
            fi
            PRERELEASE=true
          elif printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            if ! git branch -r --contains "$SHA" | grep -Eq 'origin/release/'; then
              echo "stable tags must point to a commit reachable from origin/release/*" >&2
              exit 1
            fi
            PRERELEASE=false
          else
            echo "unsupported release tag format: $TAG" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binaries
        run: ./scripts/release.sh

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build Linux packages
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          for arch in amd64 arm64; do
            cp dist/kt-linux-${arch} kt
            chmod +x kt
            ARCH=${arch} VERSION=${VERSION} nfpm package -f nfpm.yaml -p deb -t dist/
            ARCH=${arch} VERSION=${VERSION} nfpm package -f nfpm.yaml -p rpm -t dist/
            rm kt
          done

      - name: Update checksums
        run: cd dist && sha256sum kt-* *.deb *.rpm > SHA256SUMS

      - name: Collect release notes
        env:
          SHA: ${{ github.sha }}
        run: |
          LAST=$(git describe --tags --abbrev=0 "${SHA}^" 2>/dev/null || echo "")
          if [ -n "$LAST" ]; then
            BODY=$(git log --oneline "${LAST}..${SHA}" | sed 's/^/- /')
          else
            BODY="Initial release."
          fi
          printf '%s\n' "$BODY" > /tmp/release-notes.txt

      - name: Create or update release and upload assets
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
        run: |
          RELEASE_JSON=/tmp/release.json

          if curl -sf "${API_URL}/repos/${REPO}/releases/tags/${TAG}" \
            -H "Authorization: token ${TOKEN}" > "${RELEASE_JSON}"; then
            RELEASE_ID=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('id', ''))" "${RELEASE_JSON}")
          else
            RELEASE_ID=""
          fi

          if [ -z "$RELEASE_ID" ]; then
            curl -sf -X POST "${API_URL}/repos/${REPO}/releases" \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(python3 -c "
          import json, os
          print(json.dumps({
            'tag_name': os.environ['TAG'],
            'name': os.environ['TAG'],
            'body': open('/tmp/release-notes.txt').read().strip(),
            'prerelease': os.environ['PRERELEASE'].lower() == 'true',
          }))")" \
              > "${RELEASE_JSON}"
            RELEASE_ID=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['id'])" "${RELEASE_JSON}")
          fi

          echo "Release ID: ${RELEASE_ID}"

          for f in dist/kt-* dist/*.deb dist/*.rpm dist/SHA256SUMS; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            ASSET_ID=$(python3 -c "import json,sys; name=sys.argv[2]; data=json.load(open(sys.argv[1])); print(next((str(a['id']) for a in data.get('assets', []) if a.get('name') == name), ''))" "${RELEASE_JSON}" "$NAME")
            if [ -n "$ASSET_ID" ]; then
              curl -sf -X DELETE "${API_URL}/repos/${REPO}/releases/${RELEASE_ID}/assets/${ASSET_ID}" \
                -H "Authorization: token ${TOKEN}"
            fi
            echo "Uploading ${NAME}..."
            curl -sf -X POST "${API_URL}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${NAME}" \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
