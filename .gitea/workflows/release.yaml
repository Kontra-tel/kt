name: Release

on:
  push:
    branches:
      - main
      - release/**
    paths:
      - version.txt

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate release version
        id: validate
        env:
          BRANCH: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(tr -d '\n' < version.txt)
          TAG="v${VERSION}"
          PREVIOUS=$(git show "${SHA}^:version.txt" 2>/dev/null | tr -d '\n' || true)
          VALID=true
          PRERELEASE=false
          ERROR=""

          case "$HEAD_MESSAGE" in
            *"ci: restore version.txt"*)
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "valid=false" >> "$GITHUB_OUTPUT"
              echo "error=skip restore commit" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          case "$BRANCH" in
            main)
              if printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$'; then
                PRERELEASE=true
              else
                VALID=false
                ERROR="main may only release rc versions such as 1.3.0-rc.1"
              fi
              ;;
            release/*)
              if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                VALID=false
                ERROR="release branches may only release stable versions such as 1.3.0"
              fi
              ;;
            *)
              VALID=false
              ERROR="releases may only run from main or release/* branches"
              ;;
          esac

          git fetch --tags origin
          if [ "$VALID" = true ] && git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            VALID=false
            ERROR="tag $TAG already exists"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "previous=$PREVIOUS" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "valid=$VALID" >> "$GITHUB_OUTPUT"
          echo "error=$ERROR" >> "$GITHUB_OUTPUT"

      - name: Restore invalid version.txt
        if: ${{ steps.validate.outputs.skip != 'true' && steps.validate.outputs.valid != 'true' && steps.validate.outputs.previous != '' }}
        env:
          BRANCH: ${{ github.ref_name }}
          PREVIOUS: ${{ steps.validate.outputs.previous }}
        run: |
          printf '%s\n' "$PREVIOUS" > version.txt
          git config user.name "infra-bot"
          git config user.email "bot@intra.tel"
          git add version.txt
          if ! git diff --cached --quiet; then
            git commit -m "ci: restore version.txt"
            git push origin HEAD:${BRANCH}
          fi

      - name: Stop on invalid release version
        if: ${{ steps.validate.outputs.skip != 'true' && steps.validate.outputs.valid != 'true' }}
        run: |
          echo "${{ steps.validate.outputs.error }}" >&2
          exit 1

      - name: Stop on restore commit
        if: ${{ steps.validate.outputs.skip == 'true' }}
        run: exit 0

      - name: Test
        if: ${{ steps.validate.outputs.skip != 'true' }}
        run: go test ./...

      - name: Build binaries
        if: ${{ steps.validate.outputs.skip != 'true' }}
        run: ./scripts/release.sh

      - name: Install nfpm
        if: ${{ steps.validate.outputs.skip != 'true' }}
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build Linux packages
        if: ${{ steps.validate.outputs.skip != 'true' }}
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          for arch in amd64 arm64; do
            cp dist/kt-linux-${arch} kt
            chmod +x kt
            ARCH=${arch} VERSION=${VERSION} nfpm package -f nfpm.yaml -p deb -t dist/
            ARCH=${arch} VERSION=${VERSION} nfpm package -f nfpm.yaml -p rpm -t dist/
            rm kt
          done

      - name: Update checksums
        if: ${{ steps.validate.outputs.skip != 'true' }}
        run: cd dist && sha256sum kt-* *.deb *.rpm > SHA256SUMS

      - name: Create and push tag
        if: ${{ steps.validate.outputs.skip != 'true' }}
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          git config user.name "infra-bot"
          git config user.email "bot@intra.tel"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Collect release notes
        if: ${{ steps.validate.outputs.skip != 'true' }}
        env:
          SHA: ${{ github.sha }}
        run: |
          LAST=$(git describe --tags --abbrev=0 "${SHA}^" 2>/dev/null || echo "")
          if [ -n "$LAST" ]; then
            BODY=$(git log --oneline "${LAST}..${SHA}" | sed 's/^/- /')
          else
            BODY="Initial release."
          fi
          printf '%s\n' "$BODY" > /tmp/release-notes.txt

      - name: Create or update release and upload assets
        if: ${{ steps.validate.outputs.skip != 'true' }}
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.validate.outputs.tag }}
          PRERELEASE: ${{ steps.validate.outputs.prerelease }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
        run: |
          RELEASE_JSON=/tmp/release.json

          if curl -sf "${API_URL}/repos/${REPO}/releases/tags/${TAG}" \
            -H "Authorization: token ${TOKEN}" > "${RELEASE_JSON}"; then
            RELEASE_ID=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1])).get('id', ''))" "${RELEASE_JSON}")
          else
            RELEASE_ID=""
          fi

          if [ -z "$RELEASE_ID" ]; then
            curl -sf -X POST "${API_URL}/repos/${REPO}/releases" \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$(python3 -c "
          import json, os
          print(json.dumps({
            'tag_name': os.environ['TAG'],
            'name': os.environ['TAG'],
            'body': open('/tmp/release-notes.txt').read().strip(),
            'prerelease': os.environ['PRERELEASE'].lower() == 'true',
          }))")" \
              > "${RELEASE_JSON}"
            RELEASE_ID=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['id'])" "${RELEASE_JSON}")
          fi

          echo "Release ID: ${RELEASE_ID}"

          for f in dist/kt-* dist/*.deb dist/*.rpm dist/SHA256SUMS; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            ASSET_ID=$(python3 -c "import json,sys; name=sys.argv[2]; data=json.load(open(sys.argv[1])); print(next((str(a['id']) for a in data.get('assets', []) if a.get('name') == name), ''))" "${RELEASE_JSON}" "$NAME")
            if [ -n "$ASSET_ID" ]; then
              curl -sf -X DELETE "${API_URL}/repos/${REPO}/releases/${RELEASE_ID}/assets/${ASSET_ID}" \
                -H "Authorization: token ${TOKEN}"
            fi
            echo "Uploading ${NAME}..."
            curl -sf -X POST "${API_URL}/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${NAME}" \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$f"
          done
