name: Prepare Release Tag

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Release mode"
        required: true
        default: bump
        type: choice
        options:
          - bump
          - set-version
      bump:
        description: "Version bump type for bump mode"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Exact version for set-version mode, e.g. 1.3.0-rc.1"
        required: false
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ inputs.mode }}" = "set-version" ]; then
            if [ -z "${{ inputs.version }}" ]; then
              echo "version input is required for set-version mode" >&2
              exit 1
            fi
            go run ./cmd/kt release set "${{ inputs.version }}"
            NEW="${{ inputs.version }}"
          else
            go run ./cmd/kt release "${{ inputs.bump }}"
            NEW=$(tr -d '\n' < version.txt)
          fi

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"

      - name: Validate branch and version policy
        env:
          BRANCH: ${{ github.ref_name }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          case "$BRANCH" in
            main)
              if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$'; then
                echo "main may only produce rc versions such as 1.3.0-rc.1" >&2
                exit 1
              fi
              ;;
            release/*)
              if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                echo "release branches may only produce stable versions such as 1.3.0" >&2
                exit 1
              fi
              ;;
            *)
              echo "release tags may only be prepared from main or release/* branches" >&2
              exit 1
              ;;
          esac

      - name: Test
        run: go test ./...

      - name: Commit version change
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply"
          git add version.txt
          if ! git diff --cached --quiet; then
            git commit -m "release: v${VERSION}"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "version.txt already set to ${VERSION}; tagging current commit"
          fi

      - name: Create and push tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists locally" >&2
            exit 1
          fi
          git fetch --tags origin
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists on origin" >&2
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
